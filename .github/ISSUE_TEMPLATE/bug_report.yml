name: Bug report
description: Report a reproducible AGMH bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AGMH version or commit
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "python --version"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04, Debian 12, Windows 11, etc."
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the command you ran.
      render: shell
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Sanitized config
      description: Remove tokens, webhook URLs, private repository names, and credentialized URLs.
      render: toml
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or traceback
      description: Remove secrets before posting.
      render: text
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

